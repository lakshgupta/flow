name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag to publish, for example v0.1.0 or 0.1.0
        required: true
        type: string
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  # Build the React frontend once and share it across all platform jobs.
  # This avoids re-running `npm ci && npm run build` on every runner.
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read project version
        id: project-version
        run: echo "value=$(tr -d '[:space:]' < internal/buildinfo/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          bash ./scripts/sync-frontend-version.sh "${{ steps.project-version.outputs.value }}"
          cd frontend
          npm ci
          npm run build

      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-assets
          path: internal/httpapi/static/
          retention-days: 1

  # Build platform-specific binaries. Each job downloads the pre-built
  # frontend assets instead of rebuilding them.
  build-binary:
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: webkit2gtk-4.1 is installed below for Wails/desktop support.
          - runner: ubuntu-latest
            target_os: linux
            target_arch: amd64
          # macOS: WebKit.framework is always available; no extra install needed.
          - runner: macos-latest
            target_os: darwin
            target_arch: amd64
          - runner: macos-latest
            target_os: darwin
            target_arch: arm64

    runs-on: ${{ matrix.runner }}

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read project version
        id: project-version
        run: echo "value=$(tr -d '[:space:]' < internal/buildinfo/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Validate release tag matches project version
        run: |
          version="${{ steps.project-version.outputs.value }}"
          tag="$RELEASE_TAG"
          if [[ "$tag" != "$version" && "$tag" != "v$version" ]]; then
            echo "Release tag $tag does not match project version $version" >&2
            exit 1
          fi

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: internal/httpapi/static/

      - name: Install webkit2gtk (Linux only)
        if: matrix.target_os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing libwebkit2gtk-4.1-dev build-essential

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release binary
        env:
          FLOW_VERSION: ${{ steps.project-version.outputs.value }}
          FLOW_SKIP_FRONTEND_BUILD: "1"
        run: bash ./scripts/build-release.sh ${{ matrix.target_os }} ${{ matrix.target_arch }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: |
            dist/flow-${{ steps.project-version.outputs.value }}-${{ matrix.target_os }}-${{ matrix.target_arch }}.tar.gz
            dist/flow-${{ steps.project-version.outputs.value }}-${{ matrix.target_os }}-${{ matrix.target_arch }}.sha256
          retention-days: 1

      - name: Install nfpm (Linux only)
        if: matrix.target_os == 'linux'
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build .deb package (Linux only)
        if: matrix.target_os == 'linux'
        env:
          FLOW_VERSION: ${{ steps.project-version.outputs.value }}
        run: bash ./scripts/build-package-linux.sh ${{ matrix.target_arch }}

      - name: Build .dmg package (macOS only)
        if: matrix.target_os == 'darwin'
        env:
          FLOW_VERSION: ${{ steps.project-version.outputs.value }}
        run: bash ./scripts/build-package-macos.sh ${{ matrix.target_arch }}

      - name: Upload installable package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: |
            dist/flow_${{ steps.project-version.outputs.value }}_${{ matrix.target_arch }}.deb
            dist/flow_${{ steps.project-version.outputs.value }}_darwin_${{ matrix.target_arch }}.dmg
          if-no-files-found: ignore
          retention-days: 1

  # Collect all platform artifacts and publish a single GitHub release.
  publish-release:
    needs: build-binary
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read project version
        id: project-version
        run: echo "value=$(tr -d '[:space:]' < internal/buildinfo/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: '{release-*,package-*}'
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Flow ${{ steps.project-version.outputs.value }}
          generate_release_notes: true
          files: |
            dist/flow-${{ steps.project-version.outputs.value }}-linux-amd64.tar.gz
            dist/flow-${{ steps.project-version.outputs.value }}-linux-amd64.sha256
            dist/flow-${{ steps.project-version.outputs.value }}-darwin-amd64.tar.gz
            dist/flow-${{ steps.project-version.outputs.value }}-darwin-amd64.sha256
            dist/flow-${{ steps.project-version.outputs.value }}-darwin-arm64.tar.gz
            dist/flow-${{ steps.project-version.outputs.value }}-darwin-arm64.sha256
            dist/install.sh
            dist/flow_${{ steps.project-version.outputs.value }}_amd64.deb
            dist/flow_${{ steps.project-version.outputs.value }}_darwin_amd64.dmg
            dist/flow_${{ steps.project-version.outputs.value }}_darwin_arm64.dmg
